services:
  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: hiddengem_db
    command: start --log trace --user ${SURREAL_USER} --pass ${SURREAL_PASS} file://data/database.db
    ports:
      - "${DB_PORT}:8000"
    volumes:
      - surreal_data:/data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: GatheredMagic/HiddenGemMVC/Dockerfile
    container_name: hiddengem_web
    ports:
      - "${WEB_PORT}:8080"
    depends_on:
      - surrealdb
    volumes: 
      - ./GatheredMagic/HiddenGemResources:/app/shared-data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ResourcePaths__KeywordsJson=/app/shared-data/Keywords.json
      - SurrealDb__Endpoint=http://surrealdb:8000
      - SurrealDb__USER=${SURREAL_USER}
      - SurrealDb__Pass=${SURREAL_PASS}
    restart: unless-stopped

volumes:
  surreal_data:



